projects:
  - title: "RoboGuard-AI - End-to-End Robotic Anomaly Detection MLOps Platform"
    description: "A production-ready deep learning & MLOps platform for detecting anomalies in multivariate robotic time-series data. Built LSTM/GRU autoencoder pipelines for unsupervised fault detection on 250x130 telemetry windows, deployed a real-time FastAPI inference service, and integrated full observability with Prometheus and Grafana. Packaged the stack with Docker Compose and automated testing, artifact retrieval (MLflow/DagsHub), and image builds through a CI/CD pipeline on GitHub Actions."
    tech: "Python, PyTorch, FastAPI, Uvicorn, Docker, Docker Compose, MLflow, DagsHub, Prometheus, Grafana, GitHub Actions, scikit-learn, Pandas"
    image: "/images/projects/roboguard-ai.png"
    link: "https://github.com/khalil-nouisse/robot-anomaly-mlops"

  - title: "AtlasTickets - Cloud-Native Distributed Ticketing System"
    description: "A production-grade event-driven ticketing platform designed to handle 50,000+ concurrent users without race conditions or overselling. Built with CQRS architecture, deployed on Kubernetes (K3s) across Oracle Cloud ARM64 instances, with full CI/CD automation, horizontal auto-scaling, and real-time observability through Prometheus and Grafana. Stress-tested with 48,077 concurrent requests achieving zero race conditions and perfect data consistency across three databases."
    tech: "Go, Node.js, Kubernetes (K3s), Oracle Cloud (OCI), RabbitMQ, Docker, PostgreSQL, MongoDB, Redis, Prometheus, Grafana, GitHub Actions, Traefik"
    #image: "/images/projects/GrafanaDashboard.png"
    image: "/images/projects/atlastickets.png"
    link: "https://github.com/khalil-nouisse/atlas-tickets"
  - title: "AI Multi-Agent System with LangChain , LangGraph and Redis"
    description: "A multi-agent system, based on a supervisor coordinating specialized agents (Sales, Technical Support, Customer Service, Email, and Diagnostics), and integrated it into a CRM application to automate tasks and improve customer interactions."
    tech: "Python, LangChain, LangGraph , LangSmith , Redis, FastAPI"
    image: "/images/projects/multi_agents.png"
    link: "https://github.com/khalil-nouisse/multi-agent/tree/diagnostics_agent"
  - title: "ENSAM360: Smart Campus Navigation & AI Guide" 
    description: "An immersive smart campus platform combining a 360° virtual tour, a graph-based pathfinding engine for optimal indoor navigation, and a RAG-powered AI assistant (Llama 3 on Groq) to guide students and visitors in real-time."
    tech: "React, Node.js, Neo4j, Groq LPU, LangChain.js, Docker"
    image: "/images/projects/ENSAM360.png"
    link: "https://github.com/khalil-nouisse/ENSAM360"  
  - title: "Polyglot CQRS Architecture with Go & Node.js"
    description: "A distributed e-commerce system implementing the CQRS and Event-Driven patterns. It separates transactional workloads (Node.js/PostgreSQL) from high-speed read operations (MongoDB) using a concurrent Go worker and RabbitMQ to ensure scalability and eventual consistency."
    tech: "Go ,Node.js, PostgreSQL, MongoDB, RabbitMQ, Redis ,Docker" 
    image: "/images/projects/cqrs_architecture.png"
    link: "https://github.com/khalil-nouisse/SyncFlow"
  - title: "XP-FIT : mobile fitness app with Flutter"
    description: "A Flutter-based mobile app that empowers users to reach their fitness goals through gamification, personalized progress tracking, and intelligent nutrition guidance. It provides tailored workout plans, daily challenges, and real-time progress insights to boost motivation and keep users engaged."
    tech: "FLutter, Dart, Android studio, SQLite ,Github "
    image: "/images/projects/XP_FIT.jpg"
    link: "https://github.com/khalil-nouisse/XP-FIT"
  - title: "X-GATE : AI Copilot for Businesses"
    description: "A platform designed for Moroccan businesses to securely manage their data, and receive valuable analytical insights. integrates a conversational copilot that assists businesses in decision-making and offers deeper perspectives on their data."
    tech: "Next.js, Machine Learning, LangChain, Ollama, Docker , BeautifulSoup, Selenium, FAISS ,FastApi"
    image: "/images/projects/XGATE.png"
    link: ""
  - title: "ENSAM meknes Clubs Manager Desktop App"
    description: "A desktop application built with Java and JavaFX, designed to streamline the management and coordination of student clubs. The system centralizes club activities, membership, and event organization, making administration more efficient and collaborative."
    tech: "Java, JavaFX, MySQL, Scene Builder"
    image: "/images/projects/CLUBS_MANAGER.png"
    link: "https://github.com/khalil-nouisse/ENSAM_CLUBS_MANAGER/tree/User-about"

  