<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Teal outer ring -->
  <circle cx="50" cy="50" r="49" fill="#5eead4"/>
  <!-- Dark inner circle -->
  <circle cx="50" cy="50" r="43" fill="#1e2530"/>

  <!-- K: vertical bar -->
  <rect x="18" y="26" width="8" height="48" fill="#5eead4" rx="1"/>
  <!-- K: upper diagonal arm -->
  <polygon points="26,50 50,26 60,26 36,50" fill="#5eead4"/>
  <!-- K: lower diagonal arm -->
  <polygon points="26,50 36,50 60,74 50,74" fill="#5eead4"/>

  <!-- Horizontal connecting dash (the KN dash) -->
  <rect x="36" y="45" width="14" height="10" fill="#1e2530"/>

  <!-- N: left vertical bar -->
  <rect x="56" y="26" width="8" height="48" fill="#5eead4" rx="1"/>
  <!-- N: right vertical bar -->
  <rect x="76" y="26" width="8" height="48" fill="#5eead4" rx="1"/>
  <!-- N: diagonal -->
  <polygon points="64,26 84,26 84,38 64,74 56,74 56,62" fill="#5eead4"/>
</svg>
